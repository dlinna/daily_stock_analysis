# ===================================
# LiteLLM 高级配置 - 多平台故障转移
# ===================================

model_list:
  # 1. AIHubmix - Gemini 3 Flash（第一优先级）
  - model_name: gemini-3-flash-preview-free
    litellm_params:
      model: openai/gemini-3-flash-preview-free  # 确认AIHubmix实际支持的模型名
      api_key: "os.environ/AIHUBMIX_KEY"      # 与.env中统一
      api_base: https://aihubmix.com/v1
      temperature: 0.7
      timeout: 60
      # 可选：添加RPM限制防止触发限流
      # rpm: 10

  # 2. ChatAnywhere - deepseek-v3-2-exp（备用1，免费额度）
  - model_name: deepseek-v3-2-exp
    litellm_params:
      model: openai/deepseek-v3-2-exp
      api_key: "os.environ/CHATANYWHERE_KEY"  # 与.env中统一
      api_base: https://api.chatanywhere.tech/v1
      temperature: 0.7
      timeout: 45

  # 3. ChatAnywhere - GPT-4o-mini（备用2）
  - model_name: gpt4o-mini-chatanywhere
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "os.environ/CHATANYWHERE_API_KEY"
      api_base: https://api.chatanywhere.tech/v1
      temperature: 0.7
      timeout: 45

# 路由配置：故障转移 + 自动重试
router_settings:
  # 虚拟模型名（.env中的 LITELLM_MODEL 必须与此一致）
  model_name: my-multi-model-router
  
  # 路由策略：failover = 按优先级故障转移
  routing_strategy: failover
  
  # 候选模型优先级（从左到右依次尝试）
  model_selection:
    - gemini-3-flash-preview-free   # 主模型：AIHubmix Gemini
    - deepseek-v3-2-exp            # 备用1：ChatAnywhere DeepSeek
    - gpt4o-mini-chatanywhere      # 备用2：ChatAnywhere GPT
  
  # 容错配置
  num_retries: 2                   # 单个请求重试2次
  allowed_fails: 2                 # 模型连续失败2次后进入冷却
  cooldown_time: 300               # 冷却5分钟（300秒）
  timeout: 60                      # 全局超时60秒
  
  # 上下文保持（故障转移时保留对话历史）
  enable_cooldowns: true
  routing_strategy_args:
    # 可选：启用健康检查
    check_interval: 30
