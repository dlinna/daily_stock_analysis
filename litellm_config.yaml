# 模型列表：包含 AIHubmix、ChatAnywhere 两个平台的多个模型
model_list:
  # 1. AIHubmix - Gemini 3 Flash（原主模型）
  - model_name: gemini-3-flash-preview-free
    litellm_params:
      model: openai/gemini-3-flash-preview-free
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1
      temperature: 0.7
      timeout: 60

  # 2. AIHubmix - GPT-4o-mini（原备用）
  - model_name: gpt-4.1-free
    litellm_params:
      model: openai/gpt-4.1-free
      api_key: "os.environ/AIHUBMIX_KEY"
      api_base: https://aihubmix.com/v1
      temperature: 0.7
      timeout: 30

  # 3. 新增：ChatAnywhere - deepseek-v3-2-exp（免费额度，补充容量）
  - model_name: deepseek-v3-2-exp
    litellm_params:
      model: openai/deepseek-v3-2-exp
      api_key: "os.environ/CHATANYWHERE_KEY"
      api_base: https://api.chatanywhere.tech/v1  # chatanywhere的Base URL（必须带/v1）
      temperature: 0.7
      timeout: 45

  # 4. 新增：ChatAnywhere - GPT-4o-mini（可选，若chatanywhere支持）
  - model_name: gpt4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: "os.environ/CHATANYWHERE_KEY"
      api_base: https://api.chatanywhere.tech/v1
      temperature: 0.7
      timeout: 45

# 路由配置：核心是「故障转移+负载均衡」，解决额度少/调用失败问题
router_settings:
  # 虚拟路由模型名（对应.env里的 LITELLM_MODEL=my-multi-model-router）
  model_name: my-multi-model-router
  # 路由策略：failover=故障转移（主模型挂了切备用）；least-busy=负载均衡（选最空闲的）
  # 推荐：先故障转移，优先用AIHubmix，额度不够/失败再切ChatAnywhere
  routing_strategy: failover
  # 候选模型列表（优先级从左到右）
  model_selection:
    - gemini-3-flash-preview-free  # 第一优先级：AIHubmix Gemini
    - deepseek-v3-2-exp           # 第二优先级：deepseek-v3-2-exp（免费）
    - gpt-4.1-free                 # 第三优先级：AIHubmix GPT-4o-mini
    - gpt-4o-mini      # 第四优先级： GPT4o-mini（可选）
  # 重试/容错配置（解决额度不足、临时调用失败）
  num_retries: 2                   # 增加重试次数
  allowed_fails: 1                 # 单个模型连续失败2次后冷却
  cooldown_time: 60               # 冷却5分钟（避免重复调用失效模型）
  timeout: 60                      # 全局请求超时
  # 自动切换时保留对话上下文（可选，提升体验）
  keep_context: true
